<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>MindMap</title>

    <!-- Favicon (browser tab icon) -->
    <link rel="icon" href="icons/favicon.ico" type="image/x-icon" />
    <link rel="shortcut icon" href="icons/favicon.ico" type="image/x-icon" />

    <!-- PNG favicon alternatives (better for modern browsers) -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="icons/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="icons/favicon-16x16.png"
    />

    <!-- Apple Touch Icon (when saved to iOS home screen) -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="icons/apple-touch-icon.png"
    />

    <!-- Android / PWA Icon -->
    <link rel="manifest" href="site.webmanifest" />
    <meta name="theme-color" content="#ffffff" />

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="topbar">
      <span class="map-name" id="currentMapName">Untitled</span>
      <div class="controls-group">
        <button id="newMapBtn" title="New mindmap">＋ New</button>
        <button id="renameMapBtn" title="Rename">✏️ Rename</button>
        <button id="saveMapBtn" title="Save mindmap">💾 Save</button>
        <button id="exportMapBtn" title="Export JSON">⬇️ Export</button>
        <button id="importMapBtn" title="Import JSON">📂 Import</button>
        <input
          type="file"
          id="importMapFile"
          accept=".json"
          style="display: none"
        />

        <button id="deleteMapBtn" title="Delete map" style="color: #ff9b9b">
          🗑 Delete
        </button>
      </div>
      <select
        id="mapsList"
        title="Load mindmap"
        style="margin-left: 8px"
      ></select>
    </div>

    <div class="mindmap-wrap" id="wrap">
      <svg id="svgRoot" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="confirmModal" class="modal hidden">
      <div class="modal-content">
        <h2 id="confirmTitle">Confirm Delete</h2>
        <p id="confirmMessage">Are you sure you want to delete this item?</p>
        <div class="modal-buttons">
          <button id="confirmCancel" class="btn-cancel">Cancel</button>
          <button id="confirmDelete" class="btn-delete">Delete</button>
        </div>
      </div>
    </div>

    <script src="main.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("service-worker.js")
            .then((reg) => console.log("Service Worker registered:", reg.scope))
            .catch((err) =>
              console.error("Service Worker registration failed:", err)
            );
        });
      }
    </script>
  </body>
</html>
