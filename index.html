<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>MindMap</title>

    <!-- Favicon (browser tab icon) -->
    <link rel="icon" href="icons/favicon.ico" type="image/x-icon" />
    <link rel="shortcut icon" href="icons/favicon.ico" type="image/x-icon" />

    <!-- PNG favicon alternatives (better for modern browsers) -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="icons/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="icons/favicon-16x16.png"
    />

    <!-- Apple Touch Icon (when saved to iOS home screen) -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="icons/apple-touch-icon.png"
    />

    <!-- Android / PWA Icon -->
    <link rel="manifest" href="site.webmanifest" />
    <meta name="theme-color" content="#ffffff" />

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- 🌐 Responsive Toolbar -->
    <!-- 🌐 Responsive Toolbar -->
    <div class="toolbar">
      <!-- Desktop toolbar -->
      <div class="toolbar-desktop">
        <span id="currentMapName" class="map-name">Untitled</span>
        <div class="menu-items">
          <button id="newMapBtn">＋ New</button>
          <button id="saveMapBtn">💾 Save</button>
          <button id="exportMapBtn">⬇️ Export</button>
          <button id="importMapBtn">📂 Import</button>
          <input
            type="file"
            id="importMapFile"
            accept=".json"
            style="display: none"
          />
          <button id="renameMapBtn">✏️ Rename</button>
          <button id="deleteMapBtn" class="danger">🗑 Delete</button>
          <select id="mapsList" title="Load saved map"></select>
        </div>
      </div>

      <!-- Mobile toolbar -->
      <div class="toolbar-mobile">
        <div class="mobile-header">
          <span id="currentMapNameMobile" class="map-name">Untitled</span>
          <button id="mobileMenuToggle" class="menu-toggle">⚙️ Menu</button>
        </div>
        <div id="mobileMenuPanel" class="mobile-menu hidden">
          <button id="newMapBtnMobile">＋ New</button>
          <button id="saveMapBtnMobile">💾 Save</button>
          <button id="exportMapBtnMobile">⬇️ Export</button>
          <button id="importMapBtnMobile">📂 Import</button>
          <input
            type="file"
            id="importMapFileMobile"
            accept=".json"
            style="display: none"
          />
          <button id="renameMapBtnMobile">✏️ Rename</button>
          <button id="deleteMapBtnMobile" class="danger">🗑 Delete</button>
          <select id="mapsListMobile" title="Load saved map"></select>
        </div>
      </div>
    </div>

    <div class="mindmap-wrap" id="wrap">
      <svg id="svgRoot" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="confirmModal" class="modal hidden">
      <div class="modal-content">
        <h2 id="confirmTitle">Confirm Delete</h2>
        <p id="confirmMessage">Are you sure you want to delete this item?</p>
        <div class="modal-buttons">
          <button id="confirmCancel" class="btn-cancel">Cancel</button>
          <button id="confirmDelete" class="btn-delete">Delete</button>
        </div>
      </div>
    </div>

    <script src="main.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("service-worker.js")
            .then((reg) => console.log("Service Worker registered:", reg.scope))
            .catch((err) =>
              console.error("Service Worker registration failed:", err)
            );
        });
      }
    </script>
  </body>
</html>
